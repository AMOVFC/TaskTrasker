<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380">
  <title>TaskTrasker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login View -->
  <div id="login-view" class="view hidden">
    <div class="login-container">
      <div class="logo">
        <div class="logo-icon">T</div>
        <h1>TaskTrasker</h1>
      </div>
      <p class="login-subtitle">Capture tasks from anywhere</p>
      <button id="btn-sign-in" class="btn btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18" class="google-icon">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <div id="login-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- Main View -->
  <div id="main-view" class="view hidden">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="header-logo">T</span>
        <span class="header-title">TaskTrasker</span>
      </div>
      <button id="btn-sign-out" class="btn-icon" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Quick Add -->
    <div class="quick-add">
      <input
        type="text"
        id="input-new-task"
        placeholder="Add a task..."
        maxlength="500"
        autocomplete="off"
      >
      <button id="btn-add-task" class="btn-add" title="Add task">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Task List -->
    <div id="task-list" class="task-list">
      <!-- Tasks rendered by popup.js -->
    </div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Loading tasks...</span>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <p>No tasks yet</p>
      <p class="empty-hint">Type above to add your first task</p>
    </div>

    <!-- Error -->
    <div id="main-error" class="error-msg hidden"></div>
  </div>

  <!-- Scripts loaded in order: Supabase lib → shared utils → auth client → tasks API → popup UI -->
  <script src="vendor/supabase.min.js"></script>
  <script src="lib.js"></script>
  <script src="supabase-client.js"></script>
  <script src="tasks-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
