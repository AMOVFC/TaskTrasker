name: Play Store Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_play_store:
    name: Deploy to Google Play Store (${{ github.event_name == 'pull_request' && 'preview' || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/gradle-build-action@v3

      - name: Install dependencies
        run: npm install
        working-directory: apps/mobile

      - name: Set dynamic version code
        working-directory: apps/mobile
        run: |
          # Different version code ranges for internal (dev) vs production
          # Internal: 1000-1999, Production: 2000-2999
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION_CODE=$((1000 + ${{ github.run_number }}))
            echo "Building for INTERNAL track (dev) with versionCode: $VERSION_CODE"
          else
            VERSION_CODE=$((2000 + ${{ github.run_number }}))
            echo "Building for PRODUCTION track with versionCode: $VERSION_CODE"
          fi

          # Update app.json with the new versionCode
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
            console.log('Updated versionCode to: ' + $VERSION_CODE);
          "

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/tasktrasker.keystore

      - name: Build AAB
        working-directory: apps/mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: tasktrasker
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease -x assembleRelease

      - name: Package AAB for artifact storage
        working-directory: apps/mobile
        run: |
          mkdir -p aab-release
          # Find the AAB file (could be named app-release.aab or TaskTrasker-*.aab)
          AAB_FILE=$(find android/app/build/outputs/bundle/release -name "*.aab" -type f | head -1)
          if [ -z "$AAB_FILE" ]; then
            echo "Error: No AAB file found in android/app/build/outputs/bundle/release/"
            find android/app/build/outputs/bundle/release -type f
            exit 1
          fi
          echo "Found AAB: $AAB_FILE"
          cp "$AAB_FILE" aab-release/
          cd aab-release
          zip -r ../tasktrasker-aab-${{ github.sha }}.zip .
          cd ..
          ls -lh tasktrasker-aab-*.zip

      - name: Upload AAB artifact (for revert capability)
        uses: actions/upload-artifact@v4
        with:
          name: tasktrasker-aab-release
          path: apps/mobile/tasktrasker-aab-${{ github.sha }}.zip
          if-no-files-found: error

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install Fastlane
        working-directory: apps/mobile
        run: bundle exec fastlane --version

      - name: Submit to Google Play Store
        working-directory: apps/mobile
        env:
          GOOGLE_PLAY_KEY_FILE: google-play-service-account.json
          KEYSTORE_PATH: android/tasktrasker.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: tasktrasker
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FASTLANE_TRACK: ${{ github.event_name == 'pull_request' && 'internal' || 'production' }}
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}' > google-play-service-account.json
          bundle exec fastlane android deploy
          rm google-play-service-account.json
