name: Play Store Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_play_store:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          cd apps/mobile
          eas build --platform android --non-interactive

      - name: Submit to Google Play Store
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          cd apps/mobile
          # Store the service account JSON to a file for submission
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-play-service-account.json
          eas submit --platform android --non-interactive --latest
          rm google-play-service-account.json
