name: Play Store Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_play_store:
    name: Deploy to Google Play Store (${{ github.event_name == 'pull_request' && 'preview' || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install
        working-directory: apps/mobile

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/tasktrasker.keystore

      - name: Build APK/AAB
        working-directory: apps/mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: tasktrasker
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Submit to Google Play Store
        working-directory: apps/mobile
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}' > google-play-service-account.json
          # Use Play Publisher plugin or Fastlane for submission
          # For now, this is a placeholder - configure your submission method
          ls -la android/app/build/outputs/bundle/release/
          rm google-play-service-account.json
